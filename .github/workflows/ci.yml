name: SkillWeaver CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: .NET Build & Test
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: skillweaver_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'
      - name: Restore dependencies
        run: dotnet restore backend/SkillWeaver/SkillWeaver.sln
      - name: Build
        run: dotnet build backend/SkillWeaver/SkillWeaver.sln --no-restore --configuration Release
      - name: Apply migrations & run API (background)
        run: |
          cd backend/SkillWeaver/SkillWeaver.API
          cat > appsettings.Development.json << 'EOF'
          {
            "ConnectionStrings": {
              "DefaultConnection": "Host=localhost;Port=5432;Database=skillweaver_test;Username=postgres;Password=postgres"
            },
            "AllowedOrigins": ["http://localhost:4200"]
          }
          EOF
          dotnet ef database update --project ../SkillWeaver.Infrastructure --startup-project .
          dotnet run --no-build &
          sleep 8

  frontend:
    name: Angular Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install & build
        run: |
          cd frontend
          npm ci
          npx ng build --configuration production

  e2e:
    name: Playwright Tests
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: skillweaver_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Start backend
        run: |
          cd backend/SkillWeaver/SkillWeaver.API
          cat > appsettings.Development.json << 'EOF'
          {
            "ConnectionStrings": {
              "DefaultConnection": "Host=localhost;Port=5432;Database=skillweaver_test;Username=postgres;Password=postgres"
            },
            "AllowedOrigins": ["http://localhost:4200"]
          }
          EOF
          dotnet ef database update --project ../SkillWeaver.Infrastructure --startup-project .
          dotnet run &
          sleep 8
      - name: Start frontend
        run: |
          cd frontend
          npm ci
          npx ng serve --configuration development &
          sleep 15
      - name: Install Playwright browsers
        run: |
          cd e2e-tests
          npm ci
          npx playwright install --with-deps chromium
      - name: Run Playwright tests
        run: |
          cd e2e-tests
          npm test
        env:
          BASE_URL: http://localhost:4200
          API_URL: http://localhost:5047
          CI: true
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: e2e-tests/playwright-report/
          retention-days: 14